<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 72" width="400" height="72">
  <defs>
    <!-- Diamond gradient -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6EF5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Diamond mark (centered at 36,36) -->
  <!-- Outer diamond outline -->
  <polygon
    points="36,3 68,36 36,69 4,36"
    fill="none"
    stroke="#1A1F2E"
    stroke-width="2.5"
  />
  <!-- Inner diamond filled -->
  <polygon
    points="36,16 56,36 36,56 16,36"
    fill="url(#diamondGrad)"
  />
  <!-- Center cutout -->
  <polygon
    points="36,26 46,36 36,46 26,36"
    fill="white"
  />

  <!-- Thin accent line between mark and wordmark -->
  <rect x="76" y="13" width="1" height="46" fill="#E0E0E0" opacity="0.5"/>

  <!-- Wordmark – single horizontal line -->
  <text
    x="88"
    y="46"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="38"
    font-weight="600"
    letter-spacing="-1"
    fill="#FFFFFF"
  >Xovion<tspan
      font-weight="300"
      fill="#1A6EF5"
      letter-spacing="-0.5"
    > Labs</tspan></text>
</svg>
